name: Deploy Pelayanan TIK

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www/Pelayanan_tik

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Install dependencies ==="
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "=== Clear & cache config ==="
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "=== Run migrations ==="
            php artisan migrate --force

            echo "=== Fix permissions ==="
            chown -R www-data:www-data /var/www/Pelayanan_tik/storage
            chown -R www-data:www-data /var/www/Pelayanan_tik/bootstrap/cache
            chmod -R 775 /var/www/Pelayanan_tik/storage
            chmod -R 775 /var/www/Pelayanan_tik/bootstrap/cache

            echo "=== Restart PHP-FPM ==="
            sudo systemctl restart php-fpm

            echo "✅ Deploy Pelayanan TIK selesai!"
          EOF
